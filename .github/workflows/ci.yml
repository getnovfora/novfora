# SPDX-License-Identifier: Apache-2.0
name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  static:
    name: Lint & static analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
          coverage: none
      - run: composer install --no-interaction --no-progress --prefer-dist
      - name: Pint (code style)
        run: ./vendor/bin/pint --test
      - name: Larastan (static analysis)
        run: php -d memory_limit=512M ./vendor/bin/phpstan analyse --no-progress
      - name: composer audit (dependency advisories)
        run: composer audit --no-dev

  test:
    name: Pest (PHP 8.3 · MySQL 8)
    runs-on: ubuntu-latest
    # Matrix note: expand to PHP 8.4 + MariaDB + PostgreSQL as the suite grows; Dusk browser jobs
    # are added in M2 when the editor + core journeys exist.
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_DATABASE: hearth_test
          MYSQL_ROOT_PASSWORD: secret
        ports: ['3306:3306']
        options: >-
          --health-cmd="mysqladmin ping -psecret"
          --health-interval=5s --health-timeout=3s --health-retries=20
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo_mysql, mbstring, zip
          tools: composer:v2
          coverage: none
      - run: composer install --no-interaction --no-progress --prefer-dist
      - run: cp .env.example .env && php artisan key:generate
      - name: Pest (unit + feature; incl. the service-tier forced-absence suite)
        run: ./vendor/bin/pest
      - name: Baseline MySQL migrate (proves the shared-host DB path runs on MySQL)
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: hearth_test
          DB_USERNAME: root
          DB_PASSWORD: secret
        run: php artisan migrate --force && php artisan migrate:rollback --force

      - name: Backup → restore round-trip on MySQL (exit criterion 6, on the baseline engine)
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: hearth_test
          DB_USERNAME: root
          DB_PASSWORD: secret
        run: |
          set -euo pipefail
          php artisan migrate --force
          php artisan db:seed --force
          BEFORE=$(mysql -h127.0.0.1 -uroot -psecret -N -e 'SELECT COUNT(*) FROM `groups`' hearth_test)
          test "$BEFORE" -gt 0
          php artisan hearth:backup --path=storage/citest
          ARCHIVE=$(ls -1t storage/citest/hearth-*.zip | head -1)
          echo "archive = $ARCHIVE"
          php artisan migrate:fresh --force          # simulate a wipe / bad upgrade
          DURING=$(mysql -h127.0.0.1 -uroot -psecret -N -e 'SELECT COUNT(*) FROM `groups`' hearth_test)
          test "$DURING" -eq 0
          php artisan hearth:restore "$ARCHIVE" --force
          AFTER=$(mysql -h127.0.0.1 -uroot -psecret -N -e 'SELECT COUNT(*) FROM `groups`' hearth_test)
          echo "groups before=$BEFORE during=$DURING after=$AFTER"
          test "$BEFORE" = "$AFTER"

      - name: Pure-PHP backup → restore on MySQL (proc_open-free baseline path, phase-1.5 H-3)
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: hearth_test
          DB_USERNAME: root
          DB_PASSWORD: secret
          HEARTH_BACKUP_DB_METHOD: php   # force the pure-PHP dumper + PDO restore (no mysqldump/proc_open)
        run: |
          set -euo pipefail
          php artisan migrate:fresh --force
          php artisan db:seed --force
          BEFORE=$(mysql -h127.0.0.1 -uroot -psecret -N -e 'SELECT COUNT(*) FROM `groups`' hearth_test)
          test "$BEFORE" -gt 0
          php artisan hearth:backup --path=storage/citest-php
          ARCHIVE=$(ls -1t storage/citest-php/hearth-*.zip | head -1)
          php artisan migrate:fresh --force                 # wipe
          php artisan hearth:restore "$ARCHIVE" --force      # restore via PDO (no mysql client)
          AFTER=$(mysql -h127.0.0.1 -uroot -psecret -N -e 'SELECT COUNT(*) FROM `groups`' hearth_test)
          echo "pure-php groups before=$BEFORE after=$AFTER"
          test "$BEFORE" = "$AFTER"

  assets:
    name: Asset budget
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run build
      - name: assets-fresh (committed public/build matches a fresh build — RH-5)
        # /public/build is committed BY DESIGN (baseline shared hosts have no Node). This guard fails the
        # build whenever the committed assets have drifted from source — e.g. a template change that was
        # never rebuilt (the RH-5 drift). `npm run build` above just regenerated public/build from source;
        # if that changes any tracked file, the committed bundle is stale. Rebuild + commit public/build to fix.
        run: |
          set -euo pipefail
          if ! git diff --exit-code -- public/build; then
            echo "::error::public/build is stale. Run 'npm ci && npm run build' and commit the public/build diff."
            git -c core.pager=cat status --short -- public/build
            exit 1
          fi
      - name: Asset budgets (system-architecture §7)
        run: |
          set -euo pipefail
          # Base JS (excl. the lazy editor island): the main entry bundle. Doc target < 50 KB gz.
          MAIN=$(ls -1 public/build/assets/app-*.js | head -1)
          MAIN_GZ=$(gzip -c "$MAIN" | wc -c)
          echo "main app JS = ${MAIN_GZ} bytes gz (budget 51200)"
          test "$MAIN_GZ" -lt 51200

          # No single JS chunk may exceed the editor-island budget (≤ 180 KB gz, lazy-loaded).
          fail=0
          for f in public/build/assets/*.js; do
            GZ=$(gzip -c "$f" | wc -c)
            echo "  $(basename "$f") = ${GZ} bytes gz"
            if [ "$GZ" -gt 184320 ]; then echo "::error::$(basename "$f") exceeds the 180 KB gz island budget (${GZ})"; fail=1; fi
          done
          test "$fail" -eq 0

          # Total CSS gz budget.
          CSS_GZ=$(cat public/build/assets/*.css | gzip -c | wc -c)
          echo "total CSS = ${CSS_GZ} bytes gz (budget 51200)"
          test "$CSS_GZ" -lt 51200
      # Query-count + p95 budgets: the query-per-page budgets (thread ≤30, index ≤15) are enforced by the
      # Pest "Performance" suite in the `test` job above (an N+1 fails the build). p95 render targets are
      # profiling-verified (system-architecture §7 marks them "profiling", not a hard CI assertion).

  dusk:
    name: Dusk (installer enforce-ON + editor journeys, headless Chrome)
    runs-on: ubuntu-latest
    # Two serve passes (the RH-7 follow-up — enforce-ON harness split): PASS 1 drives the FULL installer
    # wizard under REAL pre-install enforcement (HEARTH_INSTALL_ENFORCE=true, no marker, fresh DB), so every
    # wire:click flows through RedirectIfNotInstalled like production; PASS 2 drives the editor journey against
    # a reachable app (enforcement off). The disposable MySQL is the wizard's install target (PASS 1 only);
    # the editor journey uses SQLite. The InstallerEnforcedLivewireTest feature tests remain the authoritative
    # RH-7 guard — this adds the real-browser belt.
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_DATABASE: hearth_install
          MYSQL_ROOT_PASSWORD: secret
        ports: ['3306:3306']
        options: >-
          --health-cmd="mysqladmin ping -psecret"
          --health-interval=5s --health-timeout=3s --health-retries=20
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo_sqlite, pdo_mysql, mbstring, zip
          tools: composer:v2
          coverage: none
      - run: composer install --no-interaction --no-progress --prefer-dist
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci && npm run build
      - name: Install the matching ChromeDriver
        run: php artisan dusk:chrome-driver --detect
      - name: Serve + run both Dusk passes (installer enforce-ON, then editor)
        run: |
          set -euo pipefail
          WS="${{ github.workspace }}"
          APP_KEY="base64:$(head -c 32 /dev/urandom | base64)"
          SANDBOX="$WS/storage/dusk-install"
          SERVE_PID=
          start_serve() {
            php artisan config:clear >/dev/null
            php artisan view:clear >/dev/null
            php artisan serve --host=127.0.0.1 --port=8000 > /tmp/serve.log 2>&1 &
            SERVE_PID=$!
            for _ in $(seq 1 30); do curl -sf http://127.0.0.1:8000/up >/dev/null 2>&1 && break || sleep 1; done
          }
          stop_serve() { kill "${SERVE_PID:-}" 2>/dev/null || true; wait "${SERVE_PID:-}" 2>/dev/null || true; SERVE_PID=; }

          # ── PASS 1 — INSTALLER (enforcement ON; installs into the disposable MySQL) ──
          rm -rf "$SANDBOX"; mkdir -p "$SANDBOX/public-storage"
          php -r '$p=new PDO("mysql:host=127.0.0.1;port=3306","root","secret",[PDO::ATTR_ERRMODE=>PDO::ERRMODE_EXCEPTION]); $p->exec("DROP DATABASE IF EXISTS hearth_install"); $p->exec("CREATE DATABASE hearth_install CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci");'
          {
            echo "APP_NAME=HearthDusk"; echo "APP_ENV=local"; echo "APP_KEY=$APP_KEY"
            echo "APP_DEBUG=true"; echo "APP_URL=http://127.0.0.1:8000"
            echo "HEARTH_INSTALL_ENFORCE=true"
            echo "DB_CONNECTION=sqlite"; echo "DB_DATABASE=$WS/database/dusk.sqlite"
            echo "CACHE_STORE=file"; echo "SESSION_DRIVER=file"; echo "QUEUE_CONNECTION=sync"
            echo "MAIL_MAILER=array"; echo "SCOUT_DRIVER=database"; echo "BROADCAST_CONNECTION=log"
            echo "HEARTH_INSTALL_REQUIRE_TOKEN=true"
            echo "HEARTH_INSTALL_TOKEN_PATH=$SANDBOX/install-token.txt"
            echo "HEARTH_INSTALL_ENV_PATH=$SANDBOX/installed.env"
            echo "HEARTH_INSTALL_MARKER=$SANDBOX/installed"
            echo "HEARTH_PUBLIC_LINK=$SANDBOX/public-storage"
            echo "HEARTH_DUSK_INSTALL_DB_HOST=127.0.0.1"
            echo "HEARTH_DUSK_INSTALL_DB_NAME=hearth_install"
            echo "HEARTH_DUSK_INSTALL_DB_USER=root"; echo "HEARTH_DUSK_INSTALL_DB_PASS=secret"
          } > .env
          : > "$WS/database/dusk.sqlite"
          php artisan migrate:fresh --force
          start_serve
          set +e; php artisan dusk --without-tty tests/Browser/InstallerWizardTest.php; INSTALLER_CODE=$?; set -e
          stop_serve

          # ── PASS 2 — APP / editor (enforcement OFF, app reachable) ──
          rm -rf "$SANDBOX"
          {
            echo "APP_NAME=HearthDusk"; echo "APP_ENV=local"; echo "APP_KEY=$APP_KEY"
            echo "APP_DEBUG=true"; echo "APP_URL=http://127.0.0.1:8000"
            echo "HEARTH_INSTALL_ENFORCE=false"
            echo "DB_CONNECTION=sqlite"; echo "DB_DATABASE=$WS/database/dusk.sqlite"
            echo "CACHE_STORE=file"; echo "SESSION_DRIVER=file"; echo "QUEUE_CONNECTION=sync"
            echo "MAIL_MAILER=array"; echo "SCOUT_DRIVER=database"; echo "BROADCAST_CONNECTION=log"
          } > .env
          : > "$WS/database/dusk.sqlite"
          php artisan migrate:fresh --force
          start_serve
          set +e; php artisan dusk --without-tty tests/Browser/EditorJourneyTest.php; EDITOR_CODE=$?; set -e
          stop_serve

          echo "dusk passes — installer(enforce ON)=$INSTALLER_CODE  editor(enforce OFF)=$EDITOR_CODE"
          if [ "$INSTALLER_CODE" -ne 0 ] || [ "$EDITOR_CODE" -ne 0 ]; then
            echo "--- serve.log (tail) ---"; tail -n 30 /tmp/serve.log || true
            exit 1
          fi
      - name: Upload failure screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: dusk-screenshots
          path: tests/Browser/screenshots
          if-no-files-found: ignore
