# SPDX-License-Identifier: Apache-2.0
# Chrome-enabled Dusk harness WITH a disposable MySQL alongside it. run.sh drives TWO sequential serve passes
# (the RH-7 follow-up — enforce-ON split): PASS 1 runs the full-wizard installer journey (InstallerWizardTest)
# under REAL pre-install enforcement (NOVFORA_INSTALL_ENFORCE=true) and installs into the disposable MySQL
# below; PASS 2 runs the editor journey against a reachable app (enforcement off) on the served app's own
# sqlite. MySQL here exists purely as the wizard's install target.
#
#   Run:  docker compose -f docker/dusk/compose.yml run --rm dusk
#
# NOT a runtime dependency: the baseline tier is plain PHP 8.3 + MySQL + cron, no Docker, no browser.
services:
  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: novfora_install
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-psecret"]
      interval: 5s
      timeout: 3s
      retries: 30

  dusk:
    build:
      context: ../..
      dockerfile: docker/dusk/Dockerfile
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ../../:/app
    working_dir: /app
